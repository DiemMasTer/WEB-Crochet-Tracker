<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crochet Pattern Tracker</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --card-bg: #1c2541;
            --tracker-bg: #4a154b;
            --tracker-bg-done: #2d6a4f;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #3a506b;
            --btn-hover: #5bc0be;
            --btn-highlight: #f72585;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 450px;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .view {
            display: none;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        .view.active {
            display: flex;
        }

        h1, h2, h3 { margin: 0; }
        
        input, textarea, button {
            font-family: inherit;
            border-radius: 8px;
            border: none;
            padding: 12px;
            font-size: 16px;
        }

        input, textarea {
            background-color: var(--card-bg);
            color: white;
            border: 1px solid var(--accent);
        }

        textarea { resize: vertical; min-height: 120px; }

        button {
            background-color: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { filter: brightness(1.2); }

        /* Color Picker Toolbar */
        .color-toolbar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: -5px; 
        }
        
        .color-toolbar::-webkit-scrollbar { display: none; }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .color-btn:hover { transform: scale(1.15); border-color: white; }

        .project-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            border-left: 5px solid var(--btn-hover);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .project-card:hover { filter: brightness(1.1); }

        .card-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .action-icon {
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .action-icon svg { pointer-events: none; }
        .action-icon:hover { transform: scale(1.2); }
        .action-icon.export:hover { color: var(--btn-hover); }
        .action-icon.delete:hover { color: var(--text-main); }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .import-link {
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: underline;
            text-decoration-color: transparent;
        }
        
        .import-link:hover { 
            color: var(--btn-hover);
            text-decoration-color: var(--btn-hover);
        }

        .nav-btn {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background-color: white;
            color: black;
        }

        .block-note-badge {
            background-color: var(--tracker-bg);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
            border: 1px solid var(--btn-hover);
            align-self: center;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pattern-display {
            background-color: var(--accent);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #segments-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .segment-card {
            background-color: var(--tracker-bg);
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .segment-card.done { background-color: var(--tracker-bg-done); border-style: solid; }

        .segment-text {
            font-size: 18px;
            font-weight: bold;
            flex: 1;
            padding-right: 10px;
            display: flex;
            align-items: center;
        }

        .segment-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .segment-counter {
            font-size: 24px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        .btn-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent);
        }

        .btn-circle.pulse {
            background-color: var(--btn-highlight);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(247, 37, 133, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(247, 37, 133, 0); }
            100% { box-shadow: 0 0 0 0 rgba(247, 37, 133, 0); }
        }

        .group-layout { display: flex; gap: 5px; align-items: stretch; }
        .group-segments { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .group-bracket {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 70px;
            margin-left: 5px;
        }
        .group-bracket::before {
            content: '';
            position: absolute;
            left: 0; top: 10px; bottom: 10px; width: 15px;
            border: 4px solid var(--btn-hover);
            border-left: none; border-radius: 0 15px 15px 0; z-index: 0;
        }
        .group-bracket-controls {
            z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
            background-color: var(--bg-color); padding: 10px 0;
        }

        .row-list-item {
            background-color: var(--card-bg); padding: 12px; margin-bottom: 8px;
            border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between;
        }
        .row-list-item:hover { background-color: var(--accent); }
        .row-list-item.row-done { border-left: 5px solid #2d6a4f; }

        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent);
            max-width: 320px; width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }
        .modal-buttons {
            display: flex; gap: 10px; justify-content: center; margin-top: 15px;
        }
        .raw-data-textarea {
            width: 100%; box-sizing: border-box; height: 100px; font-family: monospace;
            font-size: 11px; margin-top: 10px; background-color: var(--bg-color);
            color: var(--text-muted); border: 1px solid var(--accent); resize: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="home-view" class="view active">
        <div class="header-row" style="margin-bottom: 10px;">
            <h2 style="font-size: 28px;">New Project</h2>
            <div style="display: flex; gap: 15px;">
                <span class="import-link" onclick="openPasteImportModal()">📋 paste</span>
                <label for="import-file" class="import-link">📁 file</label>
                <input type="file" id="import-file" style="display:none" accept=".txt" onchange="importProjectFile(event)">
            </div>
        </div>

        <input type="text" id="new-proj-name" placeholder="Project Name">
        
        <div class="color-toolbar" id="new-color-toolbar"></div>
        <textarea id="new-proj-pattern" placeholder="Paste pattern here...&#10;White&#10;Row 1-3: 6sc [6]&#10;R2: ((1 sc, inc, 1 sc)*7)*7 [28]"></textarea>
        
        <button onclick="createProject()">Save Project</button>
        
        <h3 style="margin-top: 20px;">My Projects</h3>
        <div id="project-list"></div>
    </div>

    <div id="project-view" class="view">
        <div class="header-row">
            <button onclick="showView('home-view')">← Back</button>
            <h2>Edit Project</h2>
        </div>
        
        <label style="font-size: 14px; color: var(--text-muted); margin-bottom: -10px;">Project Name:</label>
        <input type="text" id="edit-proj-name" placeholder="Project Name">

        <label style="font-size: 14px; color: var(--text-muted); margin-bottom: -10px; margin-top: 10px;">Edit Pattern:</label>
        <div class="color-toolbar" id="edit-color-toolbar"></div>
        <textarea id="edit-proj-pattern"></textarea>
        
        <button onclick="updateProject()">Update Project</button>

        <h3>Rows</h3>
        <div id="row-list"></div>
    </div>

    <div id="tracker-view" class="view">
        <div class="header-row">
            <button onclick="openProject(currentProjectId)">← Back</button>
            <span>Tracker</span>
            <div style="width: 70px;"></div>
        </div>

        <div class="header-row" style="justify-content: center; gap: 20px;">
            <button class="nav-btn" onclick="navigateRow(-1)">❮</button>
            <h2 id="track-row-name">Row 3</h2>
            <button class="nav-btn" onclick="navigateRow(1)">❯</button>
        </div>

        <div id="track-block-note" class="block-note-badge"></div>
        <div class="pattern-display" id="track-pattern-text"></div>
        <div id="segments-container"></div>
    </div>
</div>

<!-- Modals -->
<div id="delete-modal" class="modal-overlay">
    <div class="modal-content">
        <p style="font-size: 18px; margin-bottom: 10px;">Are you sure you want to delete <strong id="delete-proj-name" style="color: var(--btn-highlight);"></strong>?</p>
        <div class="modal-buttons">
            <button id="btn-confirm-delete" style="background-color: var(--btn-highlight); flex: 1;">Yes, delete.</button>
            <button onclick="closeModal('delete-modal')" style="flex: 1; background-color: var(--accent);">No</button>
        </div>
    </div>
</div>

<div id="export-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom: 5px;">Export Project</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 5px;">Download the file, or copy the raw data if your app blocks downloads.</p>
        <textarea id="export-textarea" class="raw-data-textarea" readonly></textarea>
        <div class="modal-buttons">
            <button onclick="downloadExportData()" style="flex: 1; background-color: var(--btn-hover); color: var(--bg-color);">⬇ Download</button>
            <button onclick="copyExportData()" style="flex: 1; background-color: var(--accent);">📋 Copy</button>
        </div>
        <button onclick="closeModal('export-modal')" style="margin-top: 15px; background: transparent; border: 1px solid var(--text-muted);">Cancel</button>
    </div>
</div>

<div id="paste-import-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom: 5px;">Paste Import</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 5px;">Paste the raw text you copied previously to import your project.</p>
        <textarea id="paste-import-textarea" class="raw-data-textarea" placeholder='{"name": "My Pattern", "patternText": ...}'></textarea>
        <div class="modal-buttons">
            <button onclick="confirmPasteImport()" style="flex: 1; background-color: var(--btn-hover); color: var(--bg-color);">📥 Import</button>
            <button onclick="closeModal('paste-import-modal')" style="flex: 1; background-color: var(--accent);">Cancel</button>
        </div>
    </div>
</div>

<script>
    // --- Data Management & Upgrades ---
    let projects = JSON.parse(localStorage.getItem('crochetProjects')) || [];
    let currentProjectId = null;
    let currentRowIndex = 0;
    
    let projectToDeleteId = null;
    let currentExportFilename = "pattern.txt";

    function saveData() { localStorage.setItem('crochetProjects', JSON.stringify(projects)); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Backup & Migration to ensure nested structure works with old saves
    let needsSave = false;
    function migrateProject(proj) {
        let changed = false;
        proj.rows.forEach(r => {
            if (!r.nodes && r.segments) {
                changed = true;
                let convertSegment = (s, customCurrent = null) => {
                    let text = s.text;
                    let max = s.max;
                    let startMatch = text.match(/^(\d+)\s*(.*)$/);
                    if (startMatch && parseInt(startMatch[1], 10) === max) {
                        text = startMatch[2].trim();
                        if (!text) text = "st";
                    }
                    return { type: 'step', max: max, current: customCurrent !== null ? customCurrent : s.current, text: text, color: s.color };
                };

                let nodes = r.segments.map(s => convertSegment(s));
                if (r.groupMax > 1) {
                    let groupNode = {
                        type: 'group', max: r.groupMax, current: Math.max(1, r.groupCurrent || 1), nodes: nodes, history: {}
                    };
                    if (r.segmentHistory) {
                        for (let k in r.segmentHistory) {
                            groupNode.history[k] = r.segments.map((s, i) => convertSegment(s, r.segmentHistory[k][i]));
                        }
                    }
                    r.nodes = [groupNode];
                } else {
                    r.nodes = nodes;
                }
            }
        });
        return changed;
    }
    projects.forEach(p => { if (migrateProject(p)) needsSave = true; });
    if (needsSave) saveData();

    // --- Color Toolbar ---
    const PALETTE = ['red', 'darkorange', 'gold', 'forestgreen', 'dodgerblue', 'blueviolet', 'hotpink', 'saddlebrown', 'black', 'white', 'gray'];

    function renderColorToolbars() {
        const toolbars = [{ id: 'new-color-toolbar', target: 'new-proj-pattern' }, { id: 'edit-color-toolbar', target: 'edit-proj-pattern' }];
        toolbars.forEach(tb => {
            let container = document.getElementById(tb.id);
            if(!container) return;
            container.innerHTML = '';
            
            PALETTE.forEach(c => {
                let btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.backgroundColor = c;
                btn.title = `Apply ${c} color`;
                
                btn.onclick = () => {
                    let ta = document.getElementById(tb.target);
                    let start = ta.selectionStart;
                    let end = ta.selectionEnd;
                    let text = ta.value;

                    if (start === end) {
                        let insert = `<${c}></${c}>`;
                        ta.value = text.substring(0, start) + insert + text.substring(end);
                        ta.focus(); ta.setSelectionRange(start + c.length + 2, start + c.length + 2);
                    } else {
                        let selectedText = text.substring(start, end);
                        let wrapped = `<${c}>${selectedText}</${c}>`;
                        ta.value = text.substring(0, start) + wrapped + text.substring(end);
                        ta.focus(); ta.setSelectionRange(start, start + wrapped.length);
                    }
                };
                container.appendChild(btn);
            });
        });
    }

    // --- Parser Engine ---
    function splitTopLevel(str) {
        let result = [], current = '', depth = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            if (char === '(' || char === '[' || char === '{' || char === '<') depth++;
            else if (char === ')' || char === ']' || char === '}' || char === '>') Math.max(0, depth--);

            if (char === ',' && depth === 0) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        if (current) result.push(current.trim());
        return result;
    }

    function distributeColorTags(str) {
        return str.replace(/<([a-zA-Z]+)>([\s\S]*?)<\/\1>/gi, function(match, color, content) {
            let parts = splitTopLevel(content);
            return parts.map(p => `<${color}>${p.trim()}</${color}>`).join(', ');
        });
    }

    function parsePart(str, inheritedColor = null) {
        str = str.trim();
        let color = inheritedColor;
        
        let colorMatch = str.match(/^<([a-zA-Z]+)>([\s\S]*?)<\/\1>$/i);
        if (colorMatch) {
            color = colorMatch[1];
            str = colorMatch[2].trim();
        }
        
        // Match Group multipliers i.e., (sc, inc) * 7
        let groupMatch = str.match(/^\(([\s\S]*)\)\s*(?:\*|x|X)\s*(\d+)$/i);
        if (groupMatch) {
            return { type: 'group', max: parseInt(groupMatch[2], 10), current: 1, nodes: parseSequence(groupMatch[1], color), history: {} };
        }
        let groupMatchNoMulti = str.match(/^\(([\s\S]*)\)$/i);
        if (groupMatchNoMulti) {
            return { type: 'group', max: 1, current: 1, nodes: parseSequence(groupMatchNoMulti[1], color), history: {} };
        }
        
        // Match standard steps
        let max = 1;
        let text = str;
        
        let multiMatch = text.match(/(.*)\s*(?:\*|x|X)\s*(\d+)$/i);
        if (multiMatch) {
            max = parseInt(multiMatch[2], 10);
            text = multiMatch[1].trim();
        } else {
            let startMatch = text.match(/^(\d+)\s*(.*)$/);
            if (startMatch) {
                max = parseInt(startMatch[1], 10);
                text = startMatch[2].trim();
                if (!text) text = "st"; 
            }
        }

        return { type: 'step', max: max, current: 0, text: text, color: color };
    }

    function parseSequence(str, inheritedColor = null) {
        let parts = splitTopLevel(str);
        return parts.map(p => parsePart(p, inheritedColor));
    }

    function processPatternIntoRows(patternText) {
        let rawLines = patternText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        let expandedLines = [];

        const rangeRegex = /^(R|Row|Rows|Rnd|Rnds|Round|Rounds)?\s*(\d+)\s*-\s*(?:R|Row|Rows|Rnd|Rnds|Round|Rounds)?\s*(\d+)[\s.:-]+(.+)$/i;

        rawLines.forEach(line => {
            let match = line.match(rangeRegex);
            if (match) {
                let prefixStr = match[1] || 'R'; 
                prefixStr = prefixStr.charAt(0).toUpperCase() + prefixStr.slice(1).toLowerCase();
                if (prefixStr.endsWith('s')) prefixStr = prefixStr.slice(0, -1);
                
                let space = prefixStr === 'R' ? '' : ' ';
                let start = parseInt(match[2], 10);
                let end = parseInt(match[3], 10);

                if (start <= end) {
                    for (let i = start; i <= end; i++) expandedLines.push(`${prefixStr}${space}${i}: ${match[4].trim()}`);
                } else {
                    for (let i = start; i >= end; i--) expandedLines.push(`${prefixStr}${space}${i}: ${match[4].trim()}`);
                }
            } else {
                expandedLines.push(line);
            }
        });

        let currentBlockNote = null;
        let finalRows = [];

        expandedLines.forEach(line => {
            if (!/\d/.test(line.replace(/<.*?>/g, ''))) {
                currentBlockNote = line.replace(/<.*?>/g, '').trim(); 
                return; 
            }

            let cleanLine = line.replace(/^((?:R|Row|Rows|Rnd|Rnds|Round|Rounds)\s*\d+[.:-]?\s*|\d+[.:-]+\s*)/i, '');
            cleanLine = cleanLine.replace(/\s*[\[\(]\d+[\]\)]\s*$/, '');
            cleanLine = distributeColorTags(cleanLine);

            let nodes = parseSequence(cleanLine);

            finalRows.push({ 
                originalText: line, 
                nodes: nodes,
                blockNote: currentBlockNote
            });
        });

        return finalRows;
    }

    // --- Import / Export ---
    function promptExport(id, event) {
        event.stopPropagation();
        let proj = projects.find(p => p.id === id);
        if (!proj) return;
        let dataStr = JSON.stringify(proj, null, 2);
        let safeName = (proj.name || 'project').replace(/[^a-z0-9]/gi, '_').toLowerCase();
        currentExportFilename = `${safeName}_pattern.txt`;
        document.getElementById('export-textarea').value = dataStr;
        document.getElementById('export-modal').style.display = 'flex';
    }

    function downloadExportData() {
        let dataStr = document.getElementById('export-textarea').value;
        try {
            let blob = new Blob([dataStr], { type: "text/plain;charset=utf-8" });
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.style.display = 'none'; a.href = url; a.download = currentExportFilename;
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 200);
            closeModal('export-modal');
        } catch(e) {
            alert("Your browser blocks downloads. Please use 'Copy'.");
        }
    }

    function copyExportData() {
        let ta = document.getElementById('export-textarea');
        ta.select(); ta.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(ta.value).then(() => {
            alert("Data copied! Paste it anywhere safe."); closeModal('export-modal');
        }).catch(err => { alert("Select text and copy manually."); });
    }

    function importProjectFile(event) {
        let file = event.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = function(e) {
            processImportData(e.target.result);
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function openPasteImportModal() {
        document.getElementById('paste-import-textarea').value = '';
        document.getElementById('paste-import-modal').style.display = 'flex';
    }

    function confirmPasteImport() {
        let rawData = document.getElementById('paste-import-textarea').value.trim();
        if(!rawData) return alert("Please paste the data first.");
        if(processImportData(rawData)) closeModal('paste-import-modal');
    }

    function processImportData(rawText) {
        try {
            let importedData = JSON.parse(rawText);
            if (!importedData.name || !importedData.patternText || !importedData.rows) throw new Error("Invalid format");
            importedData.id = Date.now();
            migrateProject(importedData);
            projects.push(importedData);
            saveData(); renderProjectList();
            alert("Project imported successfully!");
            return true;
        } catch (error) {
            alert("Failed to import. Make sure you pasted the exact raw JSON text.");
            return false;
        }
    }

    // --- Core Navigation ---
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if (viewId === 'home-view') renderProjectList();
    }

    function createProject() {
        let name = document.getElementById('new-proj-name').value;
        let pattern = document.getElementById('new-proj-pattern').value;
        if (!name || !pattern) return alert("Please enter a name and pattern.");
        let newProject = { id: Date.now(), name: name, patternText: pattern, rows: processPatternIntoRows(pattern) };
        projects.push(newProject); saveData();
        document.getElementById('new-proj-name').value = ''; document.getElementById('new-proj-pattern').value = '';
        renderProjectList();
    }

    function promptDelete(id, name, event) {
        event.stopPropagation(); projectToDeleteId = id;
        document.getElementById('delete-proj-name').innerText = name;
        document.getElementById('delete-modal').style.display = 'flex';
    }

    document.getElementById('btn-confirm-delete').addEventListener('click', () => {
        if (projectToDeleteId) {
            projects = projects.filter(p => p.id !== projectToDeleteId);
            saveData(); renderProjectList(); closeModal('delete-modal');
        }
    });

    function openProject(id) {
        currentProjectId = id;
        let proj = projects.find(p => p.id === id);
        document.getElementById('edit-proj-name').value = proj.name;
        document.getElementById('edit-proj-pattern').value = proj.patternText;
        renderRowList(proj); showView('project-view');
    }

    function updateProject() {
        let proj = projects.find(p => p.id === currentProjectId);
        let newName = document.getElementById('edit-proj-name').value;
        let newPatternText = document.getElementById('edit-proj-pattern').value;
        if (!newName || !newPatternText) return alert("Please enter a name and pattern.");

        proj.name = newName;
        proj.patternText = newPatternText;
        
        let newRows = processPatternIntoRows(newPatternText);
        
        newRows.forEach((newRow, rIdx) => {
            let oldRow = proj.rows[rIdx];
            if (oldRow && oldRow.originalText === newRow.originalText) {
                newRow.nodes = JSON.parse(JSON.stringify(oldRow.nodes));
            }
        });

        proj.rows = newRows;
        saveData(); renderRowList(proj); alert("Project updated!");
    }

    // --- Tracker Operations ---
    function openTracker(rowIdx) {
        currentRowIndex = rowIdx; refreshTrackerUI(); showView('tracker-view');
    }

    function navigateRow(direction) {
        let proj = projects.find(p => p.id === currentProjectId);
        let newIdx = currentRowIndex + direction;
        if (newIdx >= 0 && newIdx < proj.rows.length) {
            currentRowIndex = newIdx; refreshTrackerUI();
        }
    }

    function getNodeByPath(nodes, pathStr) {
        let parts = pathStr.split('-').map(Number);
        let current = { nodes: nodes };
        for (let p of parts) current = current.nodes[p];
        return current;
    }

    function updateNode(pathStr, amount) {
        let proj = projects.find(p => p.id === currentProjectId);
        let node = getNodeByPath(proj.rows[currentRowIndex].nodes, pathStr);
        node.current += amount;
        if (node.current < 0) node.current = 0;
        if (node.current > node.max) node.current = node.max;
        saveData(); refreshTrackerUI();
    }

    function resetNodesDeep(nodes) {
        nodes.forEach(n => {
            if (n.type === 'step') n.current = 0;
            if (n.type === 'group') {
                n.current = 1; n.history = {}; resetNodesDeep(n.nodes);
            }
        });
    }

    function updateGroupNode(pathStr, amount) {
        let proj = projects.find(p => p.id === currentProjectId);
        let node = getNodeByPath(proj.rows[currentRowIndex].nodes, pathStr);

        if (!node.history) node.history = {};
        node.history[node.current] = JSON.parse(JSON.stringify(node.nodes));

        node.current += amount;
        if (node.current < 1) node.current = 1;
        if (node.current > node.max) node.current = node.max;

        if (node.history[node.current]) {
            node.nodes = JSON.parse(JSON.stringify(node.history[node.current]));
        } else {
            resetNodesDeep(node.nodes);
        }

        saveData(); refreshTrackerUI();
    }

    function isNodeDone(node) {
        if (node.type === 'step') return node.current === node.max;
        if (node.type === 'group') return node.current === node.max && node.nodes.every(isNodeDone);
        return false;
    }

    function checkNodesDone(nodes) {
        return nodes.every(isNodeDone);
    }

    // --- Rendering Helpers ---
    function formatProgress(nodes) {
        let parts = [];
        nodes.forEach(n => {
            if (n.type === 'step') parts.push(`${n.current}/${n.max}`);
            else if (n.type === 'group') parts.push(`[ ${formatProgress(n.nodes)} ] x ${n.current}/${n.max}`);
        });
        return parts.join(' | ');
    }

    function renderProjectList() {
        let list = document.getElementById('project-list');
        list.innerHTML = '';
        projects.forEach(proj => {
            let div = document.createElement('div');
            div.className = 'project-card';
            div.onclick = () => openProject(proj.id);
            
            let nameSpan = document.createElement('span');
            nameSpan.innerText = proj.name; nameSpan.style.fontWeight = 'bold';
            
            let actionsDiv = document.createElement('div');
            actionsDiv.className = 'card-actions';

            let expBtn = document.createElement('span'); expBtn.className = 'action-icon export';
            expBtn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`;
            expBtn.onclick = (e) => promptExport(proj.id, e);

            let delBtn = document.createElement('span'); delBtn.className = 'action-icon delete';
            delBtn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            delBtn.onclick = (e) => promptDelete(proj.id, proj.name, e);
            
            actionsDiv.appendChild(expBtn); actionsDiv.appendChild(delBtn);
            div.appendChild(nameSpan); div.appendChild(actionsDiv);
            list.appendChild(div);
        });
    }

    function renderRowList(proj) {
        let list = document.getElementById('row-list');
        list.innerHTML = '';
        proj.rows.forEach((row, idx) => {
            let isDone = checkNodesDone(row.nodes);
            let div = document.createElement('div');
            div.className = `row-list-item ${isDone ? 'row-done' : ''}`;
            
            let progressStr = formatProgress(row.nodes);
            let noteBadge = row.blockNote ? `<span style="font-size: 11px; background: var(--tracker-bg); padding: 3px 6px; border-radius: 6px; margin-right: 8px;">${row.blockNote}</span>` : '';
            let visualText = row.originalText.replace(/<\/?[a-zA-Z]+>/gi, '');

            div.innerHTML = `<span>${noteBadge}${visualText}</span> <span>${progressStr}</span>`;
            div.onclick = () => openTracker(idx);
            list.appendChild(div);
        });
    }

    function renderNodesHtml(nodes, pathPrefix = []) {
        let html = '';
        nodes.forEach((node, idx) => {
            let currentPath = [...pathPrefix, idx];
            let pathStr = currentPath.join('-');
            
            if (node.type === 'step') {
                let isDone = node.current === node.max;
                let borderColor = node.color ? `border-left: 6px solid ${node.color};` : '';
                let colorDot = node.color ? `<span style="display:inline-block; width:12px; height:12px; border-radius:50%; background-color:${node.color}; border: 1px solid white; margin-right:8px;"></span>` : '';

                html += `
                    <div class="segment-card ${isDone ? 'done' : ''}" style="${borderColor}">
                        <div class="segment-text">${colorDot}${node.text}</div>
                        <div class="segment-controls">
                            <button class="btn-circle" onclick="updateNode('${pathStr}', -1)">-</button>
                            <div class="segment-counter">${node.current}/${node.max}</div>
                            <button class="btn-circle" onclick="updateNode('${pathStr}', 1)">+</button>
                        </div>
                    </div>
                `;
            } else if (node.type === 'group') {
                let innerHtml = renderNodesHtml(node.nodes, currentPath);
                let innerDone = checkNodesDone(node.nodes);
                let groupPlusPulse = (innerDone && node.current < node.max) ? 'pulse' : '';

                html += `
                    <div class="group-layout">
                        <div class="group-segments">
                            ${innerHtml}
                        </div>
                        <div class="group-bracket">
                            <div class="group-bracket-controls">
                                <button class="btn-circle" onclick="updateGroupNode('${pathStr}', -1)">-</button>
                                <div class="segment-counter">${node.current}/${node.max}</div>
                                <button class="btn-circle ${groupPlusPulse}" onclick="updateGroupNode('${pathStr}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        });
        return html;
    }

    function refreshTrackerUI() {
        let proj = projects.find(p => p.id === currentProjectId);
        let row = proj.rows[currentRowIndex];
        
        document.getElementById('track-row-name').innerText = `Row ${currentRowIndex + 1}`;
        document.getElementById('track-pattern-text').innerText = row.originalText.replace(/<\/?[a-zA-Z]+>/gi, '');

        let noteContainer = document.getElementById('track-block-note');
        if (row.blockNote) { noteContainer.innerText = row.blockNote; noteContainer.style.display = 'inline-block'; }
        else { noteContainer.style.display = 'none'; }
        
        document.getElementById('segments-container').innerHTML = renderNodesHtml(row.nodes);
    }

    // Init App
    renderColorToolbars();
    renderProjectList();
</script>

</body>
</html>
